<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Management Login</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #0a0e17 0%, #151a23 100%);
            font-family: 'Inter', sans-serif;
            color: #d8e2ea;
        }

        .login-card {
            background: rgba(30, 36, 45, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            text-align: center;
        }

        .login-card i.fa-hotel {
            font-size: 3rem;
            color: #4a90e2;
            margin-bottom: 10px;
        }

        .login-card h2 {
            margin: 0 0 5px;
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 600;
        }

        .login-card p {
            color: #8b949e;
            margin-bottom: 25px;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: #a3b0be;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(10, 14, 23, 0.6);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            color: #e6edf3;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s ease;
            box-sizing: border-box;
        }

        .form-group input:focus {
            border-color: #4a90e2;
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background: #4a90e2;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-top: 10px;
        }

        .btn-primary:hover {
            background: #357abd;
        }
    </style>
</head>
<body class="dark-mode">

    <div class="login-card">
        <i class="fa-solid fa-hotel"></i>
        <h2>Royal Stay</h2>
        <p>Sign in to your account</p>
        
        <form id="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" required placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn-primary">Sign In</button>
        </form>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('http://localhost:3000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('userRole', data.role);
                    localStorage.setItem('username', data.username);
                    
                    window.location.href = 'index.html'; // Redirect to main dashboard
                } else {
                    const errorData = await response.json();
                    alert(errorData.message || 'Invalid Request');
                }
            } catch (error) {
                console.error(error);
                alert('Connection error! Make sure server is running.');
            }
        });
    </script>
</body>
</html>
